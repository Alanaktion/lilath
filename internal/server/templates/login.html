<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light;
      --bg: #f0f2f5;
      --text: #1a1a2e;
      --card-bg: #ffffff;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
      --subtitle: #666666;
      --label: #444444;
      --input-bg: #ffffff;
      --input-text: #1a1a2e;
      --input-border: #d1d5db;
      --focus-border: #4f46e5;
      --focus-ring: rgba(79,70,229,0.15);
      --btn-bg: #4f46e5;
      --btn-hover: #4338ca;
      --btn-active: #3730a3;
      --error-bg: #fff1f0;
      --error-border: #ffa39e;
      --error-text: #cf1322;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #0f1220;
        --text: #e9ecf8;
        --card-bg: #171c2f;
        --card-shadow: 0 12px 36px rgba(0,0,0,0.45);
        --subtitle: #aeb7d6;
        --label: #c5cdec;
        --input-bg: #0f1424;
        --input-text: #e9ecf8;
        --input-border: #343d5b;
        --focus-border: #7a88ff;
        --focus-ring: rgba(122,136,255,0.28);
        --btn-bg: #6577ff;
        --btn-hover: #7b8aff;
        --btn-active: #5366ef;
        --error-bg: #3b1620;
        --error-border: #a7475a;
        --error-text: #ffc4cd;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.3px;
    }

    .card .subtitle {
      font-size: 0.875rem;
      color: var(--subtitle);
      margin-bottom: 1.75rem;
    }

    .error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      color: var(--error-text);
      font-size: 0.875rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--input-text);
      border-radius: 7px;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1rem;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--focus-border);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    button[type="submit"] {
      width: 100%;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.7rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover { background: var(--btn-hover); }
    button[type="submit"]:active { background: var(--btn-active); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Authentication required to continue.</p>

    {{if .Error}}
    <div class="error" role="alert">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login" autocomplete="on">
      <input type="hidden" name="rd" value="{{.RedirectURL}}">

      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
