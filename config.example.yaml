# lilath configuration
# All fields are optional — values shown are defaults.

# Address and port to listen on.
listen_addr: ":8080"

# Path to the credentials file (username:bcrypt_hash, one per line).
credentials_file: "users.txt"

# IP allowlist. Requests from matching IPs bypass credential auth entirely.
# Supports individual IPs and CIDR ranges. Leave empty to disable IP allowlisting.
ip_allowlist:
  - "127.0.0.1"
  - "::1"
  # - "10.0.0.0/8"
  # - "192.168.1.50"

# Session settings.
session_ttl_minutes: 60
cookie_name: "lilath_session"

# Optional base domain for centralized login/cookies across subdomains.
# Example: for app requests on asdf.example.com, lilath redirects to
# https://example.com/login and sets cookie domain example.com.
# Leave empty to keep current behavior based on X-Forwarded-Host.
# base_domain: "example.com"

# Set cookie_secure to false only when testing over plain HTTP.
cookie_secure: true

# Trust X-Forwarded-For / X-Real-IP headers from Traefik (or another proxy).
# Disable only if lilath is exposed directly to the internet.
trust_forwarded_for: true

# Optional path to a custom HTML login page template.
# The template receives .RedirectURL (string) and .Error (string) variables.
# Leave unset to use the built-in login page.
# login_template: "/data/login.html"

# Optional path to a file of allowed Bearer tokens, one per line.
# When set, requests with a matching Authorization: Bearer <token> header
# are authenticated without requiring a login. Leave unset to disable.
# tokens_file: "/data/tokens.txt"

# Rate limiting (per IP address, fixed-window counter).
# Set a limit to 0 to disable that limiter.

# Maximum requests to GET /auth per IP per window. Protects underlying services.
rate_limit_requests: 300

# Maximum POST /login attempts per IP per window. Prevents credential stuffing.
rate_limit_login_requests: 10

# Window size in seconds for rate limiting.
rate_limit_window_seconds: 60

# IPs/CIDRs exempt from all rate limiting (e.g. internal monitoring).
# IPs already in ip_allowlist are also exempt.
# rate_limit_allowlist:
#   - "10.0.0.0/8"
